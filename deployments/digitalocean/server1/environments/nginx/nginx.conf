events {}

http {
    client_max_body_size 11000M;
    client_body_timeout 900s;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    upstream dragon-screen {
        server dragon-screen-web:3011;
    }

    # upstream fenix-screen {
    #     server fenix-screen-web:3010;
    # }

    # upstream gustex-screen {
    #     server gustex-screen-web:3013;
    # }

    upstream hotprint-screen {
        server hotprint-screen-web:3014;
    }

    upstream turbo-screen {
        server turbo-screen-web:3012;
    }

    upstream flash-screen {
        server flash-screen-web:3015;
    }

    # ── dragonscreenservice.com ───────────────────────────────────────────────

    server {
        listen 80;
        server_name dragonscreenservice.com www.dragonscreenservice.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name dragonscreenservice.com www.dragonscreenservice.com;

        ssl_certificate     /etc/letsencrypt/live/dragonscreenservice.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dragonscreenservice.com/privkey.pem;

        location / {
            proxy_pass http://dragon-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

