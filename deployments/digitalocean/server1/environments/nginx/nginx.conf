events {}

http {
    client_max_body_size 11000M;
    client_body_timeout 900s;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    upstream dragon-screen {
        server dragon-screen-web:3011;
    }

    upstream fenix-screen {
        server fenix-screen-web:3010;
    }

    upstream gustex-screen {
        server gustex-screen-web:3013;
    }

    upstream hotprint-screen {
        server hotprint-screen-web:3014;
    }

    upstream turbo-screen {
        server turbo-screen-web:3012;
    }

    upstream flash-screen {
        server flash-screen-web:3015;
    }

    server {
        listen 80;
        server_name dragonscreenservice.com www.dragonscreenservice.com;

        location / {
            proxy_pass http://dragon-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name fenixscreen.com www.fenixscreen.com;

        location / {
            proxy_pass http://fenix-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name gustexscreen.com www.gustexscreen.com;

        location / {
            proxy_pass http://gustex-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name hotprintscreen.com www.hotprintscreen.com;

        location / {
            proxy_pass http://hotprint-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name turboscreenprint.com www.turboscreenprint.com;

        location / {
            proxy_pass http://turbo-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name flashgarment.com www.flashgarment.com;

        location / {
            proxy_pass http://flash-screen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
